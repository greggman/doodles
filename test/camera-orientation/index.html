<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Camera Test</title>
    <style>
:root {
  color-scheme: light dark;
}
html {
  box-sizing: border-box;
}
*, *:before, *:after {
  box-sizing: inherit;
}
html, body {
  margin: 0;       /* remove the default margin          */
  height: 100%;    /* make the html,body fill the page   */
}
.container {
  display: flex;
  flex-direction: row;
  width: 100%;
  height: 100%;
}
@media (orientation: portrait) {
  .container {
    flex-direction: column;
  }
}
.mode {
  flex: 1 1 auto;
  min-width: 0;
  min-height: 0;
  position: relative;

  canvas {
    display: block;  /* make the canvas act like a block   */
    width: 100%;     /* make the canvas fill its container */
    height: 100%;
    border: 1px solid black;
  }

  div {
    position: absolute;
    left: 0;
    top: 0;
    background-color: rgb(0, 0, 0, 0.8);
    color: white;
    padding: 0.5em;
  }
}
#start {
  position: fixed;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}
#start>div {
  font-size: 200px;
  cursor: pointer;
}

    </style>
  </head>
  <body>
<div class="container">
  <div class="mode"><canvas id="c2d"></canvas><div>canvas 2d</div></div>
  <div class="mode"><canvas id="webgl"></canvas><div>webgl</div></div>
  <div class="mode"><canvas id="webgpu"></canvas><div>webgpu</div></div>
</div>
<div id="start">
  <div>▶️</div>
</div>
  
  </body>
  <script type="module">
import {mat4} from 'https://webgpufundamentals.org/3rdparty/wgpu-matrix.module.js';

async function main() {
  const adapter = await navigator.gpu?.requestAdapter();
  const device = await adapter?.requestDevice();

  // Get a WebGPU context from the canvas and configure it
  const canvas = document.querySelector('#webgpu');
  const context = canvas.getContext('webgpu');
  const presentationFormat = navigator.gpu.getPreferredCanvasFormat();
  context.configure({
    device,
    format: presentationFormat,
  });

  const ctx = document.querySelector('#c2d').getContext('2d');

  const gl = document.querySelector('#webgl').getContext('webgl2');
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

  const vs = `#version 300 es
  in vec2 a_position;
  out vec2 v_texCoord;
  uniform mat4 u_matrix;
  void main() {
    float ux = float(gl_VertexID / 6 + gl_VertexID % 2);
    float vy = float(
       ((gl_VertexID / 2) + (gl_VertexID / 3)) % 2); 
    v_texCoord = vec2(ux, vy);
    gl_Position = u_matrix * vec4(ux, vy, 0, 1);
  }
  `;
  const fs = `#version 300 es
  precision highp float;
  uniform sampler2D u_texture;
  in vec2 v_texCoord;
  out vec4 outColor;
  void main() {
    outColor = texture(u_texture, v_texCoord);
  }
  `;
  const program = createProgram(gl, vs, fs);
  const matLoc = gl.getUniformLocation(program, 'u_matrix');

  const module = device.createShaderModule({
    label: 'our hardcoded textured quad shaders',
    code: /* wgsl */ `
      struct OurVertexShaderOutput {
        @builtin(position) position: vec4f,
        @location(0) texcoord: vec2f,
      };

      struct Uniforms {
        matrix: mat4x4f,
      };

      @group(0) @binding(2) var<uniform> uni: Uniforms;

      @vertex fn vs(
        @builtin(vertex_index) vertexIndex : u32
      ) -> OurVertexShaderOutput {
        let pos = array(

          vec2f( 0.0,  0.0),  // center
          vec2f( 1.0,  0.0),  // right, center
          vec2f( 0.0,  1.0),  // center, top

          // 2st triangle
          vec2f( 0.0,  1.0),  // center, top
          vec2f( 1.0,  0.0),  // right, center
          vec2f( 1.0,  1.0),  // right, top
        );

        var vsOutput: OurVertexShaderOutput;
        let xy = pos[vertexIndex];
        vsOutput.position = uni.matrix * vec4f(xy, 0.0, 1.0);
        vsOutput.texcoord = xy;
        return vsOutput;
      }

      @group(0) @binding(0) var ourSampler: sampler;
      @group(0) @binding(1) var ourTexture: texture_external;

      @fragment fn fs(fsInput: OurVertexShaderOutput) -> @location(0) vec4f {
        return textureSampleBaseClampToEdge(
            ourTexture,
            ourSampler,
            fsInput.texcoord,
        );
      }
    `,
  });

  const pipeline = device.createRenderPipeline({
    label: 'hardcoded textured quad pipeline',
    layout: 'auto',
    vertex: {
      module,
    },
    fragment: {
      module,
      targets: [{ format: presentationFormat }],
    },
  });

  function startPlayingAndWaitForVideo(video) {
    return new Promise((resolve, reject) => {
      video.addEventListener('error', reject);
      if ('requestVideoFrameCallback' in video) {
        video.requestVideoFrameCallback(resolve);
      } else {
        const timeWatcher = () => {
          if (video.currentTime > 0) {
            resolve();
          } else {
            requestAnimationFrame(timeWatcher);
          }
        };
        timeWatcher();
      }
      video.play().catch(reject);
    });
  }

  function waitForClick() {
    return new Promise(resolve => {
      window.addEventListener(
        'click',
        async() => {
          document.querySelector('#start').style.display = 'none';
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: true,
            });
            video.srcObject = stream;
            resolve();
          } catch (e) {
            fail(`could not access camera: ${e.message ?? ''}`);
          }
        },
        { once: true });
    });
  }

  const video = document.createElement('video');
  await waitForClick();
  await startPlayingAndWaitForVideo(video);
  console.log('video is playing');

  canvas.addEventListener('click', () => {
    if (video.paused) {
      video.play();
    } else {
      video.pause();
    }
  });

  // offsets to the various uniform values in float32 indices
  const kMatrixOffset = 0;

  const sampler = device.createSampler({
    magFilter: 'linear',
    minFilter: 'linear',
  });

  // create a buffer for the uniform values
  const uniformBufferSize =
    16 * 4; // matrix is 16 32bit floats (4bytes each)
  const uniformBuffer = device.createBuffer({
    label: 'uniforms for quad',
    size: uniformBufferSize,
    usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
  });

  // create a typedarray to hold the values for the uniforms in JavaScript
  const uniformValues = new Float32Array(uniformBufferSize / 4);
  const matrix = uniformValues.subarray(kMatrixOffset, 16);

  const renderPassDescriptor = {
    label: 'our basic canvas renderPass',
    colorAttachments: [
      {
        // view: <- to be filled out when we render
        clearValue: [0.3, 0.3, 0.3, 1],
        loadOp: 'clear',
        storeOp: 'store',
      },
    ],
  };

  function render() {
    // -- webgpu --
    {
      const aspect = canvas.clientWidth / canvas.clientHeight;
      const videoAspect = video.videoWidth / video.videoHeight;
      const projectionMatrix = mat4.ortho(-aspect, aspect, 1, -1, 0, 1);

      // Get the current texture from the canvas context and
      // set it as the texture to render to.
      renderPassDescriptor.colorAttachments[0].view =
          context.getCurrentTexture().createView();

      const encoder = device.createCommandEncoder({
        label: 'render quad encoder',
      });
      const pass = encoder.beginRenderPass(renderPassDescriptor);
      pass.setPipeline(pipeline);

      const texture = device.importExternalTexture({source: video});

      const bindGroup = device.createBindGroup({
        layout: pipeline.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: sampler },
          { binding: 1, resource: texture },
          { binding: 2, resource: uniformBuffer },
        ],
      });

      mat4.copy(projectionMatrix, matrix);
      mat4.scale(matrix, [videoAspect, 1, 1], matrix);
      mat4.translate(matrix, [-0.5, -0.5, 0], matrix);
      device.queue.writeBuffer(uniformBuffer, 0, uniformValues);

      pass.setBindGroup(0, bindGroup);
      pass.draw(6);  // call our vertex shader 6 times

      pass.end();

      const commandBuffer = encoder.finish();
      device.queue.submit([commandBuffer]);
    }

    // --- gl ---
   {
      const aspect = canvas.clientWidth / canvas.clientHeight;
      const videoAspect = video.videoWidth / video.videoHeight;
      const projectionMatrix = mat4.ortho(-aspect, aspect, 1, -1, 0, 1);

      const matrix = mat4.identity();
      mat4.copy(projectionMatrix, matrix);
      mat4.scale(matrix, [videoAspect, 1, 1], matrix);
      mat4.translate(matrix, [-0.5, -0.5, 0], matrix);

      gl.viewport(0, 0, gl.canvas.width, gl.canvas.height);
      gl.clearColor(0.3, 0.3, 0.3, 1);
      gl.clear(gl.COLOR_BUFFER_BIT);
      gl.useProgram(program);
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, video);
      gl.uniformMatrix4fv(matLoc, false, matrix);
      gl.drawArrays(gl.TRIANGLES, 0, 6);
    }

    // --- canvas 2d ---
    {
      const aspect = canvas.clientWidth / canvas.clientHeight;
      const videoAspect = video.videoWidth / video.videoHeight;

      ctx.fillStyle = "rgb(76, 76, 76)";
      ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height);
      ctx.save();
      ctx.translate(ctx.canvas.width / 2, ctx.canvas.height / 2);
      ctx.scale(ctx.canvas.width * 0.5, ctx.canvas.height * 0.5);
      ctx.scale(1 / aspect, 1);
      ctx.scale(videoAspect, 1);
      ctx.drawImage(video, -0.5, -0.5, 1, 1);
      ctx.restore();
    }

    requestAnimationFrame(render);
  }
  requestAnimationFrame(render);

  const observer = new ResizeObserver(entries => {
    for (const entry of entries) {
      const canvas = entry.target;
      const width = entry.contentBoxSize[0].inlineSize;
      const height = entry.contentBoxSize[0].blockSize;
      canvas.width = Math.max(1, Math.min(width, device.limits.maxTextureDimension2D));
      canvas.height = Math.max(1, Math.min(height, device.limits.maxTextureDimension2D));
    }
  });
  observer.observe(canvas);
  observer.observe(gl.canvas);
  observer.observe(ctx.canvas);
}

main();

function fail(msg) {
  // eslint-disable-next-line no-alert
  alert(msg);
}

function createShader(gl, type, src) {
  const shader = gl.createShader(type);
  gl.shaderSource(shader, src);
  gl.compileShader(shader);
  if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
    throw new Error(gl.getShaderInfoLog(shader));
  }
  return shader;
}

function createProgram(gl, vs, fs, tf) {
  const program = gl.createProgram();
  gl.attachShader(program, createShader(gl, gl.VERTEX_SHADER, vs));
  gl.attachShader(program, createShader(gl, gl.FRAGMENT_SHADER, fs));
  if (tf) {
     gl.transformFeedbackVaryings(program, tf, gl.INTERLEAVED_ATTRIBS); // gl.SEPARATE_ATTRIBS);
  }
  gl.linkProgram(program);
  if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
    throw new Error(gl.getProgramInfoLog(program));
  }
  return program;
}

  </script>
</html>
