<!DOCTYPE html>
<body></body>
<script type="module">
const canvas = document.createElement('canvas');
const gl = canvas.getContext('webgl2');

const video = document.createElement('video');
video.src = 'Canvas-Animation-from-mp4.m4v';
video.muted = true;
video.loop = true;
await video.play();

// wait for the video to have dimension (this should not be needed, but just to be safe)
for (;;) {
  if (video.videoWidth > 0 && video.videoHeight > 0) {
    break;
  }
  await new Promise(requestAnimationFrame);
}

const texture = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, texture);
gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, video);

function rAFLoop() {
  gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, video.videoWidth, video.videoHeight, gl.RGBA, gl.UNSIGNED_BYTE, video);  // This should work but fails (gl error)
  // gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0,  gl.RGBA, gl.UNSIGNED_BYTE, video); // This works
  const err = gl.getError();
  if (err) {
    console.error('texSubImage2D error:', err);
  }
  requestAnimationFrame(rAFLoop); 
}

requestAnimationFrame(rAFLoop);

</script>
