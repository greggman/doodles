<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Orientation Tests</title>
  <style>
:root {
  color-scheme: light dark;
}
.wrapper {
  display: inline-flex;
  margin: 5px;
  flex-direction: column;
  align-items: center;
  background-color: #888;
}
video, canvas {
  max-width: 300px;
  max-height: 300px;
}
  </style>
</head>
<body>
<script type="module">
const videos = [
  'videos/IMG_5111.mp4',
  'videos/IMG_5112.mp4',
  'videos/IMG_5113.mp4',
  'videos/IMG_5114.mp4',
];

function add(elem, caption) {
  const wrapper = document.createElement('div');
  wrapper.className = 'wrapper'
  wrapper.append(elem);
  const captionElem = document.createElement('p');
  captionElem.textContent = caption;
  wrapper.append(captionElem);
  document.body.append(wrapper);
}

const adapter = await navigator.gpu.requestAdapter();
const device = await adapter.requestDevice();
const format = navigator.gpu.getPreferredCanvasFormat();

const module = device.createShaderModule({
  code: `
  struct VOut {
    @builtin(position) position : vec4f,
    @location(0) texCoord : vec2f,
  };

  @vertex fn vs(@builtin(vertex_index) vertexIndex : u32) -> VOut {
      let x = select(-1.0, 3.0, vertexIndex == 1);
      let y = select(-1.0, 3.0, vertexIndex == 2);
      return VOut(
        vec4f(x, y, 0.0, 1.0),
        vec2f(x, y) * vec2f(0.5, -0.5) + vec2f(0.5)
      );
  }

  @group(0) @binding(0) var u_texture: texture_2d<f32>;
  @group(0) @binding(1) var u_sampler: sampler;

  @fragment fn fs(vin: VOut) -> @location(0) vec4f {
     return textureSample(u_texture, u_sampler, vin.texCoord);
  }
  `,
});

const pipeline = device.createRenderPipeline({
  layout: 'auto',
  vertex: { module },
  fragment: { module, targets: [{ format }] },
});

const sampler = device.createSampler({
  magFilter: 'linear',
  minFilter: 'linear',
});

for (const method of ['HTMLVideoElement', 'VideoFrame']) {
  const h1 = document.createElement('h1');
  h1.textContent = method;
  document.body.append(h1);

  for (const src of videos) {
    const videoElement = document.createElement('video');
    videoElement.src = src;
    videoElement.muted = true;
    await videoElement.play();

    let video = method === 'VideoFrame' ? new VideoFrame(videoElement) : videoElement;
    let width = video.videoWidth ?? video.displayWidth;
    let height = video.videoHeight ?? video.displayHeight;

    {
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height; 
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0);
      add(canvas, 'canvas 2d');
    }

    {
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const gl = canvas.getContext('webgl2');
      const tex = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, video);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

      const vs = `#version 300 es
      in vec2 a_position;
      out vec2 v_texCoord;
      void main() {
        float x = gl_VertexID == 1 ? 3.0 : -1.0;
        float y = gl_VertexID == 2 ? 3.0 : -1.0;
        v_texCoord = vec2(x, y) * vec2(0.5, -0.5) + vec2(0.5);
        gl_Position = vec4(x, y, 0, 1);
      }
      `;
      const fs = `#version 300 es
      precision highp float;
      uniform sampler2D u_texture;
      in vec2 v_texCoord;
      out vec4 outColor;
      void main() {
        outColor = texture(u_texture, v_texCoord);
      }
      `;
      const program = createProgram(gl, vs, fs);
      gl.useProgram(program);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      add(canvas, 'webgl2');
    }

    {
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const context = canvas.getContext('webgpu');
      context.configure({
        device,
        format,
      });

      const tex = device.createTexture({
        size: [width, height],
        format: 'rgba8unorm',
        usage: GPUTextureUsage.COPY_DST | GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.RENDER_ATTACHMENT,
      });

      device.queue.copyExternalImageToTexture(
        { source: video },
        { texture: tex },
        [width, height]
      );

      const encoder = device.createCommandEncoder();
      const pass = encoder.beginRenderPass({
        colorAttachments: [{
          view: context.getCurrentTexture().createView(),
          loadOp: 'clear',
          storeOp: 'store',
        }],
      });
      pass.setPipeline(pipeline);
      pass.setBindGroup(0, device.createBindGroup({
        layout: pipeline.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: tex.createView() },
          { binding: 1, resource: sampler },
        ],
      }));
      pass.draw(3);
      pass.end();
      device.queue.submit([encoder.finish()]);
      add(canvas, 'webgpu');
    }

    // because phones don't allow too many videos
    video instanceof VideoFrame && video.close();

    document.body.append(document.createElement('hr'));
  }

  function createShader(gl, type, src) {
    const shader = gl.createShader(type);
    gl.shaderSource(shader, src);
    gl.compileShader(shader);
    if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
      throw new Error(gl.getShaderInfoLog(shader));
    }
    return shader;
  }

  function createProgram(gl, vs, fs, tf) {
    const program = gl.createProgram();
    gl.attachShader(program, createShader(gl, gl.VERTEX_SHADER, vs));
    gl.attachShader(program, createShader(gl, gl.FRAGMENT_SHADER, fs));
    if (tf) {
       gl.transformFeedbackVaryings(program, tf, gl.INTERLEAVED_ATTRIBS); // gl.SEPARATE_ATTRIBS);
    }
    gl.linkProgram(program);
    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
      throw new Error(gl.getProgramInfoLog(program));
    }
    return program;
  }
}
</script>
</body>
</html>
